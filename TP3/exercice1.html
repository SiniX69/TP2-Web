<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Exercice 1 - Mémento HTML</title>

<style>
body {
    font-family: Arial;
    background-color: #f4f6f9;
    margin: 0;
    padding: 20px;
}

section {
    background: white;
    padding: 20px;
    margin-bottom: 20px;
    border-radius: 10px;
    box-shadow: 0 3px 8px rgba(0,0,0,0.05);
}

h1 {
    text-align: center;
    color: #1e3a8a;
}
</style>

</head>

<body>

<h1>Mémento HTML5</h1>

<section>
<h2>&lt;h1&gt; à &lt;h6&gt;</h2>
<p>Balises de titres.</p>
</section>

<section>
<h2>&lt;p&gt;</h2>
<p>Balise paragraphe.</p>
</section>

<section>
<h2>&lt;strong&gt;</h2>
<p><strong>Texte important</strong></p>
</section>

<section>
<h2>&lt;em&gt;</h2>
<p><em>Texte en italique</em></p>
</section>

<section>
<h2>&lt;ul&gt; et &lt;ol&gt;</h2>
<ul>
<li>HTML</li>
<li>CSS</li>
<li>JavaScript</li>
</ul>
</section>

</body>
</html>
